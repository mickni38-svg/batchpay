<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1600" height="500" viewBox="0 0 1600 500"
     role="img" aria-label="Share by SharePay logo">
    <!-- Background -->
    <rect width="1600" height="500" fill="#000000"/>

    <!-- ===== ICON (left) - BIGGER ===== -->
    <!-- Center icon at (240,250), radius ~185 -->
    <g transform="translate(240,250)">
        <circle cx="0" cy="0" r="185" fill="#0B0F12"/>

        <!-- Segments (same palette as before) -->
        <path d="M0,0 L-50,-178 A185,185 0 0 1 65,-173 Z" fill="#4FA05C"/>
        <path d="M0,0 L65,-173 A185,185 0 0 1 168,-78 Z" fill="#79C957"/>
        <path d="M0,0 L168,-78 A185,185 0 0 1 150,108 Z" fill="#3E6B81"/>
        <path d="M0,0 L150,108 A185,185 0 0 1 -12,185 Z" fill="#0D6B78"/>
        <path d="M0,0 L-12,185 A185,185 0 0 1 -168,78 Z" fill="#79C957"/>
        <path d="M0,0 L-168,78 A185,185 0 0 1 -50,-178 Z" fill="#2F6F49"/>

        <!-- Slice lines (cut look) -->
        <g stroke="#000000" stroke-width="14" stroke-linecap="round" opacity="0.95">
            <path d="M0 0 L-50 -178"/>
            <path d="M0 0 L65 -173"/>
            <path d="M0 0 L168 -78"/>
            <path d="M0 0 L150 108"/>
            <path d="M0 0 L-12 185"/>
            <path d="M0 0 L-168 78"/>
        </g>

        <!-- Checkmark shadow edge (adds “cutting” feel) -->
        <path d="M-125 5 L-40 90 L150 -120"
              fill="none"
              stroke="#000000"
              stroke-width="52"
              stroke-linecap="round"
              stroke-linejoin="round"
              opacity="0.55"/>

        <!-- Checkmark -->
        <path d="M-125 5 L-40 90 L150 -120"
              fill="none"
              stroke="#FFFFFF"
              stroke-width="40"
              stroke-linecap="round"
              stroke-linejoin="round"/>

        <!-- Outer edge -->
        <circle cx="0" cy="0" r="185" fill="none" stroke="#000000" stroke-width="12" opacity="0.85"/>
    </g>

    <!-- ===== TEXT (right) - BIGGER, TIGHTER ===== -->
    <!-- Start text closer to icon -->
    <text x="470" y="225"
          font-family="Inter, Segoe UI, Arial, sans-serif"
          font-size="108"
          fill="#EDEDED"
          font-weight="750"
          letter-spacing="0.2">
        Share <tspan font-weight="400">by</tspan>
    </text>

    <text x="470" y="355"
          font-family="Inter, Segoe UI, Arial, sans-serif"
          font-size="148"
          fill="#79C957"
          font-weight="850"
          letter-spacing="0.2">
        SharePay
    </text>
</svg>
