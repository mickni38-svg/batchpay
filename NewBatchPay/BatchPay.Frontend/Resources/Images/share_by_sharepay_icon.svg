<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Share by SharePay icon">
    <!-- Background -->
    <rect width="1024" height="1024" fill="#000000"/>

    <!-- Center icon -->
    <g transform="translate(512,512)">
        <circle cx="0" cy="0" r="280" fill="#0B0F12"/>

        <!-- Segments -->
        <path d="M0,0 L-76,-269 A280,280 0 0 1 98,-262 Z" fill="#4FA05C"/>
        <path d="M0,0 L98,-262 A280,280 0 0 1 255,-120 Z" fill="#79C957"/>
        <path d="M0,0 L255,-120 A280,280 0 0 1 227,163 Z" fill="#3E6B81"/>
        <path d="M0,0 L227,163 A280,280 0 0 1 -17,280 Z" fill="#0D6B78"/>
        <path d="M0,0 L-17,280 A280,280 0 0 1 -255,120 Z" fill="#79C957"/>
        <path d="M0,0 L-255,120 A280,280 0 0 1 -76,-269 Z" fill="#2F6F49"/>

        <!-- Slice lines -->
        <g stroke="#000000" stroke-width="20" stroke-linecap="round" opacity="0.95">
            <path d="M0 0 L-76 -269"/>
            <path d="M0 0 L98 -262"/>
            <path d="M0 0 L255 -120"/>
            <path d="M0 0 L227 163"/>
            <path d="M0 0 L-17 280"/>
            <path d="M0 0 L-255 120"/>
        </g>

        <!-- Checkmark “cut” edge -->
        <path d="M-185 0 L-60 125 L225 -175"
              fill="none"
              stroke="#000000"
              stroke-width="80"
              stroke-linecap="round"
              stroke-linejoin="round"
              opacity="0.55"/>

        <!-- Checkmark -->
        <path d="M-185 0 L-60 125 L225 -175"
              fill="none"
              stroke="#FFFFFF"
              stroke-width="62"
              stroke-linecap="round"
              stroke-linejoin="round"/>

        <!-- Outer edge -->
        <circle cx="0" cy="0" r="280" fill="none" stroke="#000000" stroke-width="18" opacity="0.85"/>
    </g>
</svg>
